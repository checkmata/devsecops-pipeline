name: Security Scans

on:
  push:
    branches: [main]
  schedule:
    # Run full scans every Monday at 08:00 UTC even without a push
    - cron: "0 8 * * 1"

permissions:
  security-events: write   # upload SARIF to GitHub Security tab
  contents: read

jobs:
  # ── SonarCloud SAST ─────────────────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud SAST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code (full history for blame)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python & generate coverage
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install & test
        run: |
          pip install -r requirements.txt
          pytest tests/ --cov=app --cov-report=xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── Trivy: Filesystem (IaC + secrets) ───────────────────────────────────────
  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: "."
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          scanners: vuln,secret,config

      - name: Upload Trivy FS SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

  # ── Trivy: Docker image ──────────────────────────────────────────────────────
  trivy-image:
    name: Trivy Image Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build --target production -t scan-target:${{ github.sha }} .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: scan-target:${{ github.sha }}
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  # ── OWASP ZAP DAST ──────────────────────────────────────────────────────────
  zap-dast:
    name: OWASP ZAP DAST
    runs-on: ubuntu-latest
    needs: []          # runs independently; doesn't need the image to be pushed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start API for DAST scanning
        run: |
          pip install -r requirements.txt
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 8
          curl -f http://localhost:8000/health

      - name: OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.11.0
        with:
          target: "http://localhost:8000"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a"

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html
          retention-days: 14
