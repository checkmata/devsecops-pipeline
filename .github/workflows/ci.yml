name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  # ── Job 1: Lint & Unit Tests ────────────────────────────────────────────────
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flake8 linter
        run: flake8 app/ tests/ --max-line-length=100 --statistics

      - name: Run tests with coverage
        run: >
          pytest tests/ -v
          --cov=app
          --cov-report=xml
          --cov-report=term-missing
          --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.event.number }}
          path: coverage.xml
          retention-days: 7

  # ── Job 2: OWASP Dependency Check ──────────────────────────────────────────
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "devsecops-pipeline"
          path: "."
          format: "HTML,SARIF,JSON"
          args: >
            --failOnCVSS 7
            --enableRetired
            --disableAssembly
            --nvdApiKey ${{ secrets.NVD_API_KEY }}

      - name: Upload dependency check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: reports/
          retention-days: 14

  # ── Job 3: Docker Build (no push — just validates the image builds) ─────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build PR image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: false
          tags: ${{ env.IMAGE_NAME }}:pr-${{ github.event.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Quick Trivy scan on PR image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:pr-${{ github.event.number }}
          format: table
          severity: CRITICAL       # only block on CRITICAL at PR stage
          exit-code: "1"
