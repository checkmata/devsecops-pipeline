apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-api
  namespace: staging         # overridden to "production" in prod deploy step
  labels:
    app: devsecops-api
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devsecops-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0      # zero-downtime rollout

  template:
    metadata:
      labels:
        app: devsecops-api
        component: api
      annotations:
        # Prometheus auto-discovery
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"

    spec:
      # ── Security context (pod level) ────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      # ── Graceful shutdown ───────────────────────────────────────────────────
      terminationGracePeriodSeconds: 30

      containers:
        - name: api
          image: IMAGE_TAG        # replaced by CD workflow (digest pinning)
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000

          # ── Resource limits ─────────────────────────────────────────────────
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ── Health probes ───────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5

          # ── Config from ConfigMap ───────────────────────────────────────────
          env:
            - name: ENV
              valueFrom:
                configMapKeyRef:
                  name: api-config
                  key: ENV
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: api-config
                  key: LOG_LEVEL

          # ── Container security context ──────────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          # ── Temp dir (needed because readOnlyRootFilesystem=true) ───────────
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}
