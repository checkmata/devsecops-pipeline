# ── SonarCloud project configuration ─────────────────────────────────────────
# Replace YOUR_GITHUB_USERNAME and YOUR_SONARCLOUD_ORG with your actual values.
# SonarCloud → My Projects → + → Analyze new project → get these values.

sonar.projectKey=checkmata_devsecops-pipeline
sonar.organization=checkmata

sonar.projectName=DevSecOps Pipeline
sonar.projectVersion=1.0

# Source
sonar.sources=app
sonar.tests=tests
sonar.language=py
sonar.python.version=3.11

# Coverage (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions
sonar.exclusions=**/__pycache__/**,**/*.pyc,tests/**

# Quality gate: fail PR if gate fails
sonar.qualitygate.wait=true
